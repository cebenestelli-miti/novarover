# ros_gz_bridge: connect mower stack topics to Gazebo Harmonic mower model.
# ROS /cmd_vel -> Gazebo /model/mower/cmd_vel
# Gazebo /model/mower/odometry -> ROS /odom/raw

- ros_topic_name: /cmd_vel
  gz_topic_name: /model/mower/cmd_vel
  ros_type_name: geometry_msgs/msg/Twist
  gz_type_name: gz.msgs.Twist
  direction: ROS_TO_GZ

- ros_topic_name: /odom/raw
  gz_topic_name: /model/mower/odometry
  ros_type_name: nav_msgs/msg/Odometry
  gz_type_name: gz.msgs.Odometry
  direction: GZ_TO_ROS
