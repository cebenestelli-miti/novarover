# Sim-only config: odom frame, no geofence. Use with mission_file pointing to a .waypoints (x y meters) file.
mission_manager:
  ros__parameters:
    farm_origin_lat: 0.0
    farm_origin_lon: 0.0
    farm_origin_alt: 0.0
    mission_frame_id: "odom"
    require_gnss_quality: false
    min_fix_type: 2
    geofence_enabled: false
    # Empty polygon not always passed; use minimal 3 points (ignored when geofence_enabled is false).
    geofence_polygon: [0.0, 0.0, 1.0, 0.0, 1.0, 1.0]

waypoint_follower:
  ros__parameters:
    farm_origin_lat: 0.0
    farm_origin_lon: 0.0
    farm_origin_alt: 0.0
    mission_frame_id: "odom"
    max_linear_speed: 0.5
    max_angular_speed: 1.2
    waypoint_tolerance_m: 0.2
    debug_log: true
    debug_log_period_ms: 1000
    # Bug state machine tuning
    bug_trigger_dist_m: 2.0
    bug_hard_block_dist_m: 0.45
    bug_follow_speed_ms: 0.20
    bug_wall_target_dist_m: 0.75
    bug_wall_kp: 1.8
    bug_leave_progress_m: 0.5
    bug_leave_heading_rad: 0.40
    bug_leave_front_clear_m: 1.6
    bug_leave_min_along_goal_m: 1.8
    bug_min_follow_ticks: 12
    bug_wall_lost_ticks: 5
    bug_turn_min_rad: 1.0
    bug_trigger_ticks: 2
    bug_blocked_ticks: 15
