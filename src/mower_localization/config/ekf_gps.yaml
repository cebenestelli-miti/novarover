# EKF config for mower with GPS: fuse /odom/raw + /imu/data + /odometry/gps (from navsat_transform_node).
# Use with use_ekf:=true and use_gps:=true. Requires /gps/fix (NEO-M9N) and /imu/data (BNO085).

ekf_filter_node:
  ros__parameters:
    frequency: 30.0
    sensor_timeout: 0.1
    two_d_mode: true
    publish_tf: true
    print_diagnostics: false

    map_frame: map
    odom_frame: odom
    base_link_frame: base_link
    world_frame: odom

    # Wheel odometry
    odom0: /odom/raw
    odom0_config: [true, true, false,
                   false, false, true,
                   true, true, false,
                   false, false, true,
                   false, false, false]
    odom0_queue_size: 5
    odom0_differential: false
    odom0_relative: false

    # GPS in local frame (from navsat_transform_node)
    odom1: /odometry/gps
    odom1_config: [true, true, false,
                   false, false, false,
                   false, false, false,
                   false, false, false,
                   false, false, false]
    odom1_queue_size: 5
    odom1_differential: false
    odom1_relative: false

    # BNO085 IMU
    imu0: /imu/data
    imu0_config: [false, false, false,
                  true, true, true,
                  false, false, false,
                  true, true, true,
                  true, true, true]
    imu0_queue_size: 5
    imu0_differential: false
    imu0_relative: true
    imu0_remove_gravitational_acceleration: true
