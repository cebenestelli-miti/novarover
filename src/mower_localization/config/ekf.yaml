# EKF config for mower: fuse /odom/raw (wheel) + /imu/data (BNO085).
# When GPS (NEO-M9N) is available, add navsat_transform_node + odom1 for GPS later.
# Install: sudo apt install ros-jazzy-robot-localization

ekf_filter_node:
  ros__parameters:
    frequency: 30.0
    sensor_timeout: 0.1
    two_d_mode: true
    publish_tf: true
    print_diagnostics: false

    map_frame: map
    odom_frame: odom
    base_link_frame: base_link
    world_frame: odom

    # Wheel odometry: position (x, y) and yaw from pose; angular z from twist
    odom0: /odom/raw
    odom0_config: [true, true, false,
                   false, false, true,
                   true, true, false,
                   false, false, true,
                   false, false, false]
    odom0_queue_size: 5
    odom0_differential: false
    odom0_relative: false

    # BNO085 IMU: orientation (roll, pitch, yaw), angular velocity, linear acceleration
    imu0: /imu/data
    imu0_config: [false, false, false,
                  true, true, true,
                  false, false, false,
                  true, true, true,
                  true, true, true]
    imu0_queue_size: 5
    imu0_differential: false
    imu0_relative: true
    imu0_remove_gravitational_acceleration: true
