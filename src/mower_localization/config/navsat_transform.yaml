# navsat_transform_node: convert /gps/fix to local-frame odometry for EKF.
# Subscribes: odometry (from EKF, remap to /odom), /imu/data, /gps/fix.
# Publishes: /odometry/gps (nav_msgs/Odometry in local frame).
# Used when use_ekf:=true and use_gps:=true (NEO-M9N).
# For farm-fixed map: set datum to match mower_mission farm_origin (lat/lon). If this node does not
# support a fixed datum param, drive to farm origin and power on so first fix = datum, or use a node
# that publishes a static transform from map to odom at farm origin.

navsat_transform_node:
  ros__parameters:
    frequency: 30.0
    delay: 3.0
    magnetic_declination_radians: 0.1835
    yaw_offset: 0.0
    zero_altitude: true
    broadcast_utm_transform: false
    publish_filtered_gps: false
    use_odometry_yaw: false
    # false = use first GPS fix as origin. For farm-fixed map, match origin to farm_origin (see farm_origin.yaml).
    wait_for_datum: false
